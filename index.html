<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Elemental Voice Calculator</title>
    <style>
        :root {
            --accent: #00d2ff;
            --calc-shadow: rgba(0, 0, 0, 0.5);
        }

        /* THEME STYLES (Kept from your original) */
        [data-theme="water"] { --bg-gradient: linear-gradient(180deg, #001f3f, #005c97); --calc-bg: rgba(255, 255, 255, 0.1); --text-color: #e0ffff; --accent: #00f2ff; --glow: 0 0 15px #00f2ff; }
        [data-theme="fire"] { --bg-gradient: radial-gradient(circle, #4a0000, #000); --calc-bg: rgba(20, 0, 0, 0.5); --text-color: #ffaa00; --accent: #ff4500; --glow: 0 0 15px #ff4500; }
        [data-theme="thunder"] { --bg-gradient: linear-gradient(180deg, #020111, #191970); --calc-bg: rgba(10, 10, 30, 0.7); --text-color: #f0f0ff; --accent: #9d00ff; --glow: 0 0 20px #ffffff; }
        [data-theme="earth"] { --bg-gradient: linear-gradient(135deg, #132601, #000); --calc-bg: rgba(30, 50, 20, 0.6); --text-color: #d4ffaa; --accent: #7cfc00; --glow: 0 0 15px #4caf50; }

        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif; background: var(--bg-gradient); overflow: hidden; transition: 1.5s ease;
        }

        .calculator {
            background: var(--calc-bg); backdrop-filter: blur(35px); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px; border-radius: 35px; box-shadow: 0 25px 80px var(--calc-shadow); width: 400px; z-index: 10;
        }

        /* Voice Status Indicator */
        #voice-status {
            font-size: 0.8rem; color: var(--text-color); margin-bottom: 5px; text-align: center;
            height: 15px; opacity: 0.7;
        }

        #display {
            width: 100%; height: 85px; font-size: 2.2rem; text-align: right; margin-bottom: 25px;
            padding: 20px; box-sizing: border-box; border: none; border-radius: 20px;
            background: rgba(0, 0, 0, 0.4); color: var(--text-color); text-shadow: var(--glow); outline: none;
        }

        .buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }

        button {
            padding: 18px 5px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 0.95rem; font-weight: bold; cursor: pointer; background: rgba(255,255,255,0.05);
            color: var(--text-color); transition: 0.3s;
        }

        button:hover { transform: scale(1.1); background: rgba(255,255,255,0.15); box-shadow: var(--glow); }

        .voice-btn { grid-column: span 5; background: rgba(255, 255, 255, 0.1); color: var(--accent); border: 1px solid var(--accent); margin-bottom: 10px; }
        .listening { background: var(--accent) !important; color: #000 !important; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .sci { color: var(--accent); }
        .equals { background: var(--accent); color: #000; grid-column: span 2; }
        .clear { background: rgba(255, 0, 0, 0.2); }

        .controls { position: absolute; top: 30px; display: flex; gap: 10px; z-index: 100; }
        .mode-btn { padding: 10px 18px; border-radius: 20px; border: none; background: rgba(0,0,0,0.5); color: #fff; cursor: pointer; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    </style>
</head>
<body data-theme="water">

    <div class="controls">
        <button class="mode-btn" onclick="setTheme('water')">🌊 Sea</button>
        <button class="mode-btn" onclick="setTheme('fire')">🌋 Fire</button>
        <button class="mode-btn" onclick="setTheme('thunder')">⛈️ Storm</button>
        <button class="mode-btn" onclick="setTheme('earth')">🌿 Earth</button>
    </div>

    <canvas id="bg-canvas"></canvas>

    <div class="calculator">
        <div id="voice-status">Click mic to speak</div>
        <button id="voice-trigger" class="voice-btn" onclick="startVoice()">🎤 </button>
        
        <input type="text" id="display" readonly placeholder="0">
        
        <div class="buttons">
            <button class="sci" onclick="sciOp('sin')">sin</button>
            <button class="sci" onclick="sciOp('cos')">cos</button>
            <button class="sci" onclick="sciOp('tan')">tan</button>
            <button class="clear" onclick="clearDisplay()">AC</button>
            <button class="clear" onclick="backspace()">DEL</button>
            <button class="sci" onclick="sciOp('log')">log</button>
            <button class="sci" onclick="sciOp('sqrt')">√</button>
            <button class="sci" onclick="appendToDisplay('**')">xʸ</button>
            <button class="sci" onclick="appendToDisplay('Math.PI')">π</button>
            <button onclick="appendToDisplay('/')">÷</button>
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button onclick="appendToDisplay('(')">(</button>
            <button onclick="appendToDisplay('*')">×</button>
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button onclick="appendToDisplay(')')">)</button>
            <button onclick="appendToDisplay('-')">-</button>
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('+')">+</button>
            <button onclick="appendToDisplay('.')">.</button>
            <button class="sci" onclick="sciOp('exp')">exp</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        // --- VOICE RECOGNITION LOGIC ---
        const voiceTrigger = document.getElementById('voice-trigger');
        const voiceStatus = document.getElementById('voice-status');

        function startVoice() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Your browser does not support voice recognition.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                voiceTrigger.classList.add('listening');
                voiceStatus.innerText = "Listening...";
            };

            recognition.onresult = (event) => {
                let transcript = event.results[0][0].transcript.toLowerCase();
                processVoiceCommand(transcript);
            };

            recognition.onend = () => {
                voiceTrigger.classList.remove('listening');
                voiceStatus.innerText = "Click mic to speak";
            };

            recognition.start();
        }

        function processVoiceCommand(cmd) {
            // Replace words with symbols
            let cleanCmd = cmd
                .replace(/plus/g, '+')
                .replace(/minus/g, '-')
                .replace(/times|multiplied by|x/g, '*')
                .replace(/divided by/g, '/')
                .replace(/point/g, '.')
                .replace(/equals|calculate/g, '')
                .replace(/clear|reset/g, 'CLEAR')
                .replace(/\s/g, ''); // Remove spaces

            if (cleanCmd === 'CLEAR') {
                clearDisplay();
                return;
            }

            // Append numbers and operators to display
            display.value += cleanCmd;
            
            // Optional: Auto-calculate if "equals" was said
            if (cmd.includes('equals') || cmd.includes('calculate')) {
                calculate();
            }
        }

        // --- ORIGINAL LOGIC & CANVAS (Preserved) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize;
        resize();

        class Particle {
            constructor() { this.init(); }
            init() {
                const theme = document.body.getAttribute('data-theme');
                this.x = Math.random() * canvas.width;
                this.y = (theme === 'thunder' || theme === 'earth') ? -20 : canvas.height + 20;
                this.size = Math.random() * 10 + 2;
                this.speed = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.6 + 0.1;
                this.angle = Math.random() * Math.PI * 2;
            }
            draw() {
                const theme = document.body.getAttribute('data-theme');
                ctx.beginPath();
                ctx.fillStyle = this.getStyle(theme);
                if (theme === 'earth') { ctx.ellipse(this.x, this.y, this.size, this.size/2, this.angle, 0, Math.PI * 2); }
                else if (theme === 'water') { ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); }
                else { ctx.rect(this.x, this.y, theme === 'thunder' ? 1 : this.size, theme === 'thunder' ? this.size * 4 : this.size); }
                ctx.fill();
            }
            getStyle(theme) {
                if (theme === 'water') return `rgba(255, 255, 255, ${this.opacity})`;
                if (theme === 'fire') return `rgba(255, ${Math.random()*150}, 0, ${this.opacity})`;
                if (theme === 'thunder') return `rgba(150, 150, 255, ${this.opacity})`;
                if (theme === 'earth') return `rgba(100, ${Math.random()*100 + 100}, 50, ${this.opacity})`;
            }
            update() {
                const theme = document.body.getAttribute('data-theme');
                if (theme === 'thunder' || theme === 'earth') {
                    this.y += this.speed * (theme === 'thunder' ? 8 : 1.5);
                    this.x += Math.sin(this.y / 50);
                } else { this.y -= this.speed; }
                if (this.y < -100 || this.y > canvas.height + 100) this.init();
            }
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < 100; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        function setTheme(t) {
            document.body.setAttribute('data-theme', t);
            createParticles();
        }

        const display = document.getElementById('display');
        function appendToDisplay(i) { display.value += i; }
        function clearDisplay() { display.value = ""; }
        function backspace() { display.value = display.value.slice(0,-1); }
        function calculate() {
            try { display.value = eval(display.value.replace('π', 'Math.PI')); }
            catch { display.value = "Error"; }
        }
        function sciOp(op) {
            try {
                let v = eval(display.value) || 0;
                if(op==='sin') v = Math.sin(v*Math.PI/180);
                if(op==='cos') v = Math.cos(v*Math.PI/180);
                if(op==='tan') v = Math.tan(v*Math.PI/180);
                if(op==='log') v = Math.log10(v);
                if(op==='sqrt') v = Math.sqrt(v);
                if(op==='exp') v = Math.exp(v);
                display.value = Number(v.toFixed(8));
            } catch { display.value = "Error"; }
        }

        createParticles();
        animate();
    </script>
</body>
</html>
